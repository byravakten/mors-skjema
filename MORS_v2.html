<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MORS — Byråvakten</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: #fff;
  color: #1a1a1a;
  padding-bottom: 60px;
}

/* HEADER */
.header {
  background: #1a1a1a;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.header-logo {
  width: 42px; height: 42px;
  border: 2px solid #fff;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.header-logo svg { width: 22px; height: 22px; }

.header-title { color: #fff; font-size: 17px; font-weight: 800; }
.header-sub { color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 2px; }

.header-clock {
  margin-left: auto;
  text-align: right;
  flex-shrink: 0;
  background: rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 6px 12px;
}

.header-clock .time { font-size: 18px; font-weight: 800; color: #fff; }
.header-clock .date { font-size: 11px; color: rgba(255,255,255,0.5); }

.btn-back {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 14px; font-weight: 700;
  cursor: pointer;
  display: none;
  font-family: inherit;
}

/* PAGES */
.page { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
.page.active { display: block; }

/* FORSIDE */
.forside-hero {
  text-align: center;
  padding: 40px 20px 32px;
}

.hero-circle {
  width: 80px; height: 80px;
  border: 3px solid #1a1a1a;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
}

.forside-hero h2 { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
.forside-hero p { font-size: 15px; color: #666; }

.forside-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: 8px;
}

.forside-btn {
  background: #fff;
  border: 2px solid #ddd;
  border-radius: 14px;
  padding: 28px 16px;
  text-align: center;
  cursor: pointer;
  font-family: inherit;
  transition: transform 0.1s;
  -webkit-appearance: none;
  touch-action: manipulation;
}

.forside-btn:active { transform: scale(0.96); }

.forside-btn.red {
  background: #e94560;
  border-color: #e94560;
  box-shadow: 0 4px 16px rgba(233,69,96,0.3);
}

.forside-btn .btn-icon { font-size: 42px; display: block; margin-bottom: 12px; }
.forside-btn .btn-title { font-size: 19px; font-weight: 800; color: #1a1a1a; display: block; }
.forside-btn.red .btn-title { color: #fff; }
.forside-btn .btn-sub { font-size: 13px; color: #999; display: block; margin-top: 4px; }
.forside-btn.red .btn-sub { color: rgba(255,255,255,0.8); }

.hist-count {
  display: inline-block;
  background: #1a1a1a;
  color: #fff;
  border-radius: 20px;
  padding: 2px 10px;
  font-size: 13px;
  font-weight: 700;
  margin-top: 6px;
}

/* SEKSJON */
.seksjon {
  background: #fff;
  border: 1.5px solid #e8e8e8;
  border-radius: 14px;
  margin-bottom: 14px;
  overflow: hidden;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}

.seksjon-header {
  background: #1a1a1a;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.seksjon-header h2 {
  font-size: 13px;
  font-weight: 800;
  color: #fff;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.seksjon-body { padding: 16px; }

/* FELT */
.felt { margin-bottom: 16px; }
.felt:last-child { margin-bottom: 0; }

.felt label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.felt label span { font-weight: 400; font-size: 11px; text-transform: none; letter-spacing: 0; }

.felt input[type=text],
.felt input[type=tel],
.felt input[type=email],
.felt textarea {
  width: 100%;
  height: 58px;
  border: 1.5px solid #ddd;
  border-radius: 10px;
  padding: 0 16px;
  font-size: 18px;
  color: #1a1a1a;
  background: #fafafa;
  outline: none;
  -webkit-appearance: none;
  font-family: inherit;
  touch-action: manipulation;
}

.felt input:focus, .felt textarea:focus {
  border-color: #1a1a1a;
  background: #fff;
}

.felt textarea {
  height: auto;
  min-height: 120px;
  padding: 14px 16px;
  resize: none;
  line-height: 1.6;
}

.felt-rad {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* JA/NEI */
.jn-gruppe {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 58px;
  border: 1.5px solid #ddd;
  border-radius: 10px;
  overflow: hidden;
}

.jn-knapp {
  background: #fafafa;
  border: none;
  font-size: 17px;
  font-weight: 700;
  color: #999;
  cursor: pointer;
  font-family: inherit;
  -webkit-appearance: none;
  touch-action: manipulation;
  transition: background 0.1s;
}

.jn-knapp:first-child { border-right: 1.5px solid #ddd; }
.jn-knapp.ja { background: #dcfce7; color: #16a34a; }
.jn-knapp.nei { background: #fee2e2; color: #dc2626; }

/* AVKRYSSING */
.avkryssing-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.avkryssing-knapp {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #fafafa;
  border: 1.5px solid #ddd;
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  font-family: inherit;
  -webkit-appearance: none;
  touch-action: manipulation;
  text-align: left;
  min-height: 60px;
  transition: background 0.1s;
}

.avkryssing-knapp.aktiv { background: #f0f0f0; border-color: #1a1a1a; }

.avkryssing-boks {
  width: 24px; height: 24px;
  border: 1.5px solid #ccc;
  border-radius: 5px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: #fff;
}

.avkryssing-knapp.aktiv .avkryssing-boks {
  background: #1a1a1a;
  border-color: #1a1a1a;
}

.avkryssing-tekst { font-size: 14px; font-weight: 600; color: #1a1a1a; line-height: 1.2; }

/* EIENDELER */
.eiendeler-knapp {
  display: flex;
  align-items: center;
  gap: 14px;
  background: #fafafa;
  border: 1.5px solid #ddd;
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  font-family: inherit;
  -webkit-appearance: none;
  width: 100%;
  touch-action: manipulation;
  min-height: 56px;
}

.eiendeler-knapp.aktiv { background: #f0f0f0; border-color: #1a1a1a; }

.eiendeler-knapp .avkryssing-boks { width: 26px; height: 26px; }
.eiendeler-knapp.aktiv .avkryssing-boks { background: #1a1a1a; border-color: #1a1a1a; }
.eiendeler-knapp span { font-size: 16px; font-weight: 700; color: #1a1a1a; }

/* MOTTAKERE */
.mottaker-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }

.mottaker-badge {
  display: flex; align-items: center; gap: 6px;
  background: #fafafa;
  border: 1.5px solid #ddd;
  border-radius: 20px;
  padding: 9px 14px 9px 10px;
  font-size: 14px; font-weight: 600; color: #666;
  cursor: pointer;
  font-family: inherit;
  -webkit-appearance: none;
  touch-action: manipulation;
  transition: background 0.1s;
}

.mottaker-badge.aktiv { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }

.badge-ikon {
  width: 18px; height: 18px;
  border: 1.5px solid currentColor;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800;
}

.mottaker-liste { display: flex; flex-direction: column; gap: 10px; }

.mottaker-rad { display: flex; gap: 8px; align-items: center; }

.mottaker-rad input {
  flex: 1; height: 52px;
  border: 1.5px solid #ddd; border-radius: 10px;
  padding: 0 14px; font-size: 16px;
  background: #fafafa; outline: none;
  -webkit-appearance: none; font-family: inherit;
}

.mottaker-rad input:focus { border-color: #1a1a1a; background: #fff; }

.fjern-knapp {
  width: 52px; height: 52px;
  background: #fee2e2; color: #ef4444;
  border: none; border-radius: 10px;
  font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: inherit; -webkit-appearance: none;
}

.legg-til-knapp {
  width: 100%; height: 52px;
  border: 2px dashed #ddd; border-radius: 10px;
  background: transparent; color: #888;
  font-size: 15px; font-weight: 700;
  cursor: pointer; margin-top: 6px;
  font-family: inherit; -webkit-appearance: none;
  touch-action: manipulation;
}

/* SEND */
.send-area {
  background: #fff;
  border: 1.5px solid #e8e8e8;
  border-radius: 14px;
  padding: 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}

.send-knapp {
  width: 100%; height: 66px;
  background: #e94560; color: #fff;
  border: none; border-radius: 10px;
  font-size: 20px; font-weight: 800;
  cursor: pointer; margin-bottom: 10px;
  font-family: inherit; -webkit-appearance: none;
  touch-action: manipulation;
  box-shadow: 0 4px 14px rgba(233,69,96,0.3);
}

.send-knapp:active { transform: scale(0.98); }

.nullstill-knapp {
  width: 100%; height: 48px;
  background: transparent; color: #888;
  border: 1.5px solid #ddd; border-radius: 10px;
  font-size: 15px; cursor: pointer; margin-top: 10px;
  font-family: inherit; -webkit-appearance: none;
  touch-action: manipulation;
}

.info-tekst {
  font-size: 12px; color: #999;
  text-align: center; margin-top: 10px; line-height: 1.6;
}

/* HISTORIKK */
.historikk-liste { display: flex; flex-direction: column; gap: 10px; }

.historikk-rad {
  background: #fff;
  border: 1.5px solid #e8e8e8;
  border-radius: 14px;
  padding: 18px 20px;
  display: flex; align-items: center; gap: 16px;
  cursor: pointer;
  width: 100%;
  text-align: left;
  font-family: inherit;
  -webkit-appearance: none;
  touch-action: manipulation;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}

.historikk-rad:active { background: #f5f5f5; }

.hist-ikon {
  width: 44px; height: 44px;
  background: #f5f5f5;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}

.hist-info { flex: 1; }
.hist-navn { font-size: 16px; font-weight: 800; color: #1a1a1a; }
.hist-meta { font-size: 13px; color: #888; margin-top: 3px; }
.hist-pil { font-size: 20px; color: #ccc; }

.tom-historikk { text-align: center; padding: 60px 20px; color: #888; }
.tom-historikk .ikon { font-size: 48px; margin-bottom: 16px; }

/* DETALJ */
.detalj-kort {
  background: #fff;
  border: 1.5px solid #e8e8e8;
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 14px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}

.detalj-topp {
  background: #1a1a1a;
  padding: 16px 18px;
}

.detalj-topp h3 { font-size: 18px; font-weight: 800; color: #fff; }
.detalj-topp p { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 4px; }

.detalj-kropp { padding: 16px; }

.detalj-rad {
  display: flex; gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid #f0f0f0;
}

.detalj-rad:last-child { border-bottom: none; }
.detalj-etikett { font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; min-width: 130px; }
.detalj-verdi { font-size: 15px; font-weight: 600; color: #1a1a1a; flex: 1; }

.detalj-knapper { display: flex; gap: 10px; margin-bottom: 10px; }

.send-igjen-knapp {
  flex: 2; height: 56px;
  background: #e94560; color: #fff;
  border: none; border-radius: 10px;
  font-size: 16px; font-weight: 800;
  cursor: pointer; font-family: inherit;
  -webkit-appearance: none; touch-action: manipulation;
}

.pdf-igjen-knapp {
  flex: 1; height: 56px;
  background: #1a1a1a; color: #fff;
  border: none; border-radius: 10px;
  font-size: 15px; font-weight: 800;
  cursor: pointer; font-family: inherit;
  -webkit-appearance: none; touch-action: manipulation;
}

.slett-knapp {
  width: 100%; height: 48px;
  background: transparent; color: #ef4444;
  border: 1.5px solid #fecaca; border-radius: 10px;
  font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: inherit;
  -webkit-appearance: none; touch-action: manipulation;
}
</style>

</head>
<body>

<header class="header">
  <div class="header-logo">
    <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="11" cy="11" r="9" stroke="white" stroke-width="1.5"/>
      <circle cx="11" cy="11" r="5" stroke="white" stroke-width="1"/>
    </svg>
  </div>
  <div>
    <div class="header-title" id="headerTittel">MORS-skjema</div>
    <div class="header-sub">Oslo Nøytrale Byråvakt AS</div>
  </div>
  <div style="margin-left:auto; display:flex; align-items:center; gap:10px;">
    <button class="btn-back" id="btnTilbake" onclick="gaaTilbake()">← Tilbake</button>
    <div class="header-clock">
      <div class="time" id="klokke">--:--</div>
      <div class="date" id="dato">--.--</div>
    </div>
  </div>
</header>

<!-- FORSIDE -->
<div class="page active" id="side-forside">
  <div class="forside-hero">
    <div class="hero-circle">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="15" stroke="#1a1a1a" stroke-width="2"/>
        <circle cx="18" cy="18" r="8" stroke="#1a1a1a" stroke-width="1.5"/>
      </svg>
    </div>
    <h2>Byråvakten</h2>
    <p>Oslo Nøytrale Byråvakt AS</p>
  </div>
  <div class="forside-btns">
    <button class="forside-btn red" onclick="startNytt()">
      <span class="btn-icon">📋</span>
      <span class="btn-title">Registrer MORS</span>
      <span class="btn-sub">Nytt oppdrag</span>
    </button>
    <button class="forside-btn" onclick="visHistorikk()">
      <span class="btn-icon">📂</span>
      <span class="btn-title">Historikk</span>
      <span class="btn-sub">Siste 7 dager</span>
      <span class="hist-count" id="historikkTeller" style="display:none">0</span>
    </button>
  </div>
</div>

<!-- HISTORIKK -->
<div class="page" id="side-historikk">
  <div class="historikk-liste" id="historikkListe"></div>
</div>

<!-- DETALJ -->
<div class="page" id="side-detalj">
  <div class="detalj-kort">
    <div class="detalj-topp">
      <h3 id="detaljNavn">—</h3>
      <p id="detaljMeta">—</p>
    </div>
    <div class="detalj-kropp" id="detaljKropp"></div>
  </div>
  <div class="detalj-knapper">
    <button class="send-igjen-knapp" onclick="sendIgjen()">✉️ Send på nytt</button>
    <button class="pdf-igjen-knapp" onclick="pdfIgjen()">📄 PDF</button>
  </div>
  <button class="slett-knapp" onclick="slettOppdrag()">🗑 Slett fra historikk</button>
</div>

<!-- SKJEMA -->
<div class="page" id="side-skjema">

  <div class="seksjon">
    <div class="seksjon-header"><h2>📋 Oppdrag</h2></div>
    <div class="seksjon-body">
      <div class="felt">
        <label>Oppdragstidspunkt</label>
        <input type="text" id="oppdragstidspunkt" placeholder="16.6.26 12:00">
      </div>
      <div class="felt">
        <label>Oppdragssted</label>
        <input type="text" id="oppdragssted" placeholder="Bopel, sykehjem, institusjon...">
      </div>
      <div class="felt-rad">
        <div class="felt">
          <label>Oppdragsadresse</label>
          <input type="text" id="oppdragsadresse" placeholder="Gate og nummer">
        </div>
        <div class="felt">
          <label>Poststed</label>
          <input type="text" id="poststed" placeholder="Oslo, Askim...">
        </div>
      </div>
      <div class="felt">
        <label>Adressebeskrivelse</label>
        <input type="text" id="adressebeskrivelse" placeholder="Rom, etasje, inngang...">
      </div>
      <div class="felt">
        <label>Transport til</label>
        <input type="text" id="transportTil" placeholder="Sykehus">
      </div>
    </div>
  </div>

  <div class="seksjon">
    <div class="seksjon-header"><h2>✦ Avdøde</h2></div>
    <div class="seksjon-body">
      <div class="felt-rad">
        <div class="felt">
          <label>Avdødes navn</label>
          <input type="text" id="avdoedesNavn" placeholder="Etternavn, Fornavn">
        </div>
        <div class="felt">
          <label>Født dato</label>
          <input type="text" id="foedtDato" placeholder="18.06.1939">
        </div>
      </div>
      <div class="felt">
        <label>Refnr <span>(siste siffer i personnummer)</span></label>
        <input type="text" id="refnr" placeholder="f.eks. 49101" inputmode="numeric">
      </div>
    </div>
  </div>

  <div class="seksjon">
    <div class="seksjon-header"><h2>👤 Rekvirent</h2></div>
    <div class="seksjon-body">
      <div class="felt-rad">
        <div class="felt">
          <label>Rekvirent</label>
          <input type="text" id="rekvirent" placeholder="Legevakta / navn">
        </div>
        <div class="felt">
          <label>Rekvirent ved</label>
          <input type="text" id="rekvirentVed" placeholder="Institusjon / rolle">
        </div>
      </div>
      <div class="felt-rad">
        <div class="felt">
          <label>Telefon</label>
          <input type="tel" id="rekvirentTlf" placeholder="Telefonnummer">
        </div>
        <div class="felt">
          <label>E-post</label>
          <input type="email" id="rekvirentEpost" placeholder="epost@eks.no">
        </div>
      </div>
      <div class="felt">
        <label>Annen vente info</label>
        <input type="text" id="annenVenteInfo" placeholder="Avd. telefon, tilleggsinfo...">
      </div>
    </div>
  </div>



  <div class="seksjon">
    <div class="seksjon-header"><h2>✅ Status på stedet</h2></div>
    <div class="seksjon-body">
      <div class="felt-rad" style="margin-bottom:12px">
        <div class="felt">
          <label>Pårørende venter</label>
          <div class="jn-gruppe">
            <button class="jn-knapp" id="jn_paarorende_ja" onclick="setJN('paarorende','ja')" type="button">✓ Ja</button>
            <button class="jn-knapp nei" id="jn_paarorende_nei" onclick="setJN('paarorende','nei')" type="button">✗ Nei</button>
          </div>
          <input type="hidden" id="paarorendeVenter" value="nei">
        </div>
        <div class="felt">
          <label>Lege venter</label>
          <div class="jn-gruppe">
            <button class="jn-knapp" id="jn_legeVenter_ja" onclick="setJN('legeVenter','ja')" type="button">✓ Ja</button>
            <button class="jn-knapp nei" id="jn_legeVenter_nei" onclick="setJN('legeVenter','nei')" type="button">✗ Nei</button>
          </div>
          <input type="hidden" id="legeVenter" value="nei">
        </div>
      </div>
      <div class="felt-rad" style="margin-bottom:12px">
        <div class="felt">
          <label>Politi venter</label>
          <div class="jn-gruppe">
            <button class="jn-knapp" id="jn_politiVenter_ja" onclick="setJN('politiVenter','ja')" type="button">✓ Ja</button>
            <button class="jn-knapp nei" id="jn_politiVenter_nei" onclick="setJN('politiVenter','nei')" type="button">✗ Nei</button>
          </div>
          <input type="hidden" id="politiVenter" value="nei">
        </div>
        <div class="felt">
          <label>Lege ventes</label>
          <div class="jn-gruppe">
            <button class="jn-knapp" id="jn_legeVentes_ja" onclick="setJN('legeVentes','ja')" type="button">✓ Ja</button>
            <button class="jn-knapp nei" id="jn_legeVentes_nei" onclick="setJN('legeVentes','nei')" type="button">✗ Nei</button>
          </div>
          <input type="hidden" id="legeVentes" value="nei">
        </div>
      </div>
      <div class="felt-rad" style="margin-bottom:16px">
        <div class="felt">
          <label>Dødsattest skrevet</label>
          <div class="jn-gruppe">
            <button class="jn-knapp" id="jn_dodsattest_ja" onclick="setJN('dodsattest','ja')" type="button">✓ Ja</button>
            <button class="jn-knapp nei" id="jn_dodsattest_nei" onclick="setJN('dodsattest','nei')" type="button">✗ Nei</button>
          </div>
          <input type="hidden" id="doedsattestSkrevet" value="nei">
        </div>
        <div class="felt"></div>
      </div>
      <div class="avkryssing-grid">
        <button class="avkryssing-knapp" id="cbk_privatHenting" onclick="toggleCbk('privatHenting')" type="button">
          <div class="avkryssing-boks" id="cbkboks_privatHenting"></div>
          <span class="avkryssing-tekst">Privat henting</span>
        </button>
        <button class="avkryssing-knapp" id="cbk_obduksjon" onclick="toggleCbk('obduksjon')" type="button">
          <div class="avkryssing-boks" id="cbkboks_obduksjon"></div>
          <span class="avkryssing-tekst">Obduksjonskjøring</span>
        </button>
        <button class="avkryssing-knapp" id="cbk_avlastning" onclick="toggleCbk('avlastning')" type="button">
          <div class="avkryssing-boks" id="cbkboks_avlastning"></div>
          <span class="avkryssing-tekst">Avlastningskjøring</span>
        </button>
        <button class="avkryssing-knapp" id="cbk_rettslig" onclick="toggleCbk('rettslig')" type="button">
          <div class="avkryssing-boks" id="cbkboks_rettslig"></div>
          <span class="avkryssing-tekst">Rettslig henting</span>
        </button>
        <button class="avkryssing-knapp" id="cbk_eierbyraa" onclick="toggleCbk('eierbyraa')" type="button">
          <div class="avkryssing-boks" id="cbkboks_eierbyraa"></div>
          <span class="avkryssing-tekst">For eierbyrå</span>
        </button>
        <button class="avkryssing-knapp" id="cbk_donor" onclick="toggleCbk('donor')" type="button">
          <div class="avkryssing-boks" id="cbkboks_donor"></div>
          <span class="avkryssing-tekst">Donorkjøring</span>
        </button>
      </div>
    </div>
  </div>

  <div class="seksjon">
    <div class="seksjon-header"><h2>📝 Notater og eiendeler</h2></div>
    <div class="seksjon-body">
      <div class="felt-rad">
        <div class="felt">
          <label>Pårørende navn og tlf</label>
          <input type="text" id="paarorendeNavn" placeholder="Navn, telefonnummer">
        </div>
        <div class="felt">
          <label>Pårørende varslet</label>
          <div class="jn-gruppe">
            <button class="jn-knapp" id="jn_paarorendeVarslet_ja" onclick="setJN('paarorendeVarslet','ja')" type="button">✓ Ja</button>
            <button class="jn-knapp nei" id="jn_paarorendeVarslet_nei" onclick="setJN('paarorendeVarslet','nei')" type="button">✗ Nei</button>
          </div>
          <input type="hidden" id="paarorendeVarslet" value="nei">
        </div>
      </div>
      <div class="felt">
        <label>Mottatte eiendeler</label>
        <button class="eiendeler-knapp" id="eiendelKnapp" onclick="toggleEiendel()" type="button">
          <div class="avkryssing-boks" id="eiendelBoks"></div>
          <span>Mottatt eiendeler</span>
        </button>
      </div>
      <div class="felt">
        <label>Diverse opplysninger / Hentet av</label>
        <textarea id="diverseOpplysninger" placeholder="Eks: Hentet av X og Y kl. 12:00. Posenummer: XXXX"></textarea>
      </div>
    </div>
  </div>



  <div class="send-area">
    <button class="send-knapp" onclick="genererPDF()" type="button">📄 Generer og send PDF</button>
    <button class="nullstill-knapp" onclick="nullstill()" type="button">Nullstill skjema</button>
  </div>

</div>

<script>
// ===== TILSTAND =====
const cbkState = { privatHenting:false, obduksjon:false, avlastning:false, rettslig:false, eierbyraa:false, donor:false };
let eiendelAktiv = false;
let aktivtOppdragIdx = null;
let mottakerTeller = 0;

// ===== KLOKKE =====
function oppdaterKlokke() {
  const n = new Date();
  const hh = String(n.getHours()).padStart(2,'0');
  const mm = String(n.getMinutes()).padStart(2,'0');
  const dd = String(n.getDate()).padStart(2,'0');
  const mo = String(n.getMonth()+1).padStart(2,'0');
  document.getElementById('klokke').textContent = hh+':'+mm;
  document.getElementById('dato').textContent = dd+'.'+mo;
}
oppdaterKlokke();
setInterval(oppdaterKlokke, 1000);

// ===== NAVIGASJON =====
function visSide(side) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('side-'+side).classList.add('active');
  const titler = { forside:'MORS-skjema', skjema:'Registrer MORS', historikk:'Historikk', detalj:'Oppdrag' };
  document.getElementById('headerTittel').textContent = titler[side] || 'MORS-skjema';
  document.getElementById('btnTilbake').style.display = side === 'forside' ? 'none' : 'block';
  window.scrollTo(0,0);
}

function gaaTilbake() { visSide('forside'); }

function startNytt() {
  nullstillSkjema();
  visSide('skjema');
}

function visHistorikk() {
  byggHistorikkListe();
  visSide('historikk');
}

// ===== JA/NEI =====
function setJN(felt, val) {
  const feltId = { paarorende:'paarorendeVenter', legeVenter:'legeVenter', politiVenter:'politiVenter', legeVentes:'legeVentes', dodsattest:'doedsattestSkrevet', paarorendeVarslet:'paarorendeVarslet' };
  const el = document.getElementById(feltId[felt]);
  if (el) el.value = val;
  const ja = document.getElementById('jn_'+felt+'_ja');
  const nei = document.getElementById('jn_'+felt+'_nei');
  if (ja) ja.className = 'jn-knapp' + (val==='ja' ? ' ja' : '');
  if (nei) nei.className = 'jn-knapp' + (val==='nei' ? ' nei' : '');
}

// ===== AVKRYSSING =====
function toggleCbk(id) {
  cbkState[id] = !cbkState[id];
  document.getElementById('cbk_'+id).classList.toggle('aktiv', cbkState[id]);
  const boks = document.getElementById('cbkboks_'+id);
  boks.innerHTML = cbkState[id] ? '<svg width="14" height="14" viewBox="0 0 14 14"><polyline points="2,7 5,11 12,3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>' : '';
}

// ===== EIENDELER =====
function toggleEiendel() {
  eiendelAktiv = !eiendelAktiv;
  document.getElementById('eiendelKnapp').classList.toggle('aktiv', eiendelAktiv);
  const boks = document.getElementById('eiendelBoks');
  boks.innerHTML = eiendelAktiv ? '<svg width="14" height="14" viewBox="0 0 14 14"><polyline points="2,7 5,11 12,3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>' : '';
  if (eiendelAktiv) { document.getElementById('eiendelKnapp').style.background='#f0f0f0'; document.getElementById('eiendelKnapp').style.borderColor='#1a1a1a'; }
  else { document.getElementById('eiendelKnapp').style.background='#fafafa'; document.getElementById('eiendelKnapp').style.borderColor='#ddd'; }
}

// ===== BADGES =====
function toggleBadge(btn) {
  btn.classList.toggle('aktiv');
  btn.querySelector('.badge-ikon').textContent = btn.classList.contains('aktiv') ? '✓' : '+';
}

// ===== MOTTAKERE =====
function leggTilMottaker() {
  mottakerTeller++;
  const id = 'mottaker_'+mottakerTeller;
  const div = document.createElement('div');
  div.className = 'mottaker-rad';
  div.id = 'rad_'+id;
  div.innerHTML = '<input type="email" id="'+id+'" placeholder="epost@eksempel.no" inputmode="email"><button class="fjern-knapp" onclick="fjernMottaker(\'rad_'+id+'\')" type="button">×</button>';
  const ml = document.getElementById('mottakerListe'); if(ml) ml.appendChild(div);
  document.getElementById(id).focus();
  document.getElementById(id).addEventListener('blur', lagreMottakere);
}

function fjernMottaker(id) { document.getElementById(id)?.remove(); lagreMottakere(); }

function lagreMottakere() {
  const e = [];
  document.querySelectorAll('.mottaker-rad input[type=email]').forEach(i => { if(i.value.trim()) e.push(i.value.trim()); });
  try { localStorage.setItem('mors_mottakere', JSON.stringify(e)); } catch(err) {}
}

function lastMottakere() {
  try {
    const lagret = JSON.parse(localStorage.getItem('mors_mottakere') || '[]');
    lagret.forEach(email => {
      mottakerTeller++;
      const id = 'mottaker_'+mottakerTeller;
      const div = document.createElement('div');
      div.className = 'mottaker-rad'; div.id = 'rad_'+id;
      div.innerHTML = '<input type="email" id="'+id+'" value="'+email+'" inputmode="email"><button class="fjern-knapp" onclick="fjernMottaker(\'rad_'+id+'\')" type="button">×</button>';
      const ml = document.getElementById('mottakerListe'); if(ml) ml.appendChild(div);
      document.getElementById(id).addEventListener('blur', lagreMottakere);
    });
  } catch(err) {}
}

// ===== HENT SKJEMADATA =====
function hentData() {
  const v = id => document.getElementById(id)?.value?.trim() || '';
  return {
    lagretTid: Date.now(),
    oppdragstidspunkt: v('oppdragstidspunkt'), oppdragssted: v('oppdragssted'),
    oppdragsadresse: v('oppdragsadresse'), poststed: v('poststed'),
    adressebeskrivelse: v('adressebeskrivelse'), transportTil: v('transportTil'),
    avdoedesNavn: v('avdoedesNavn'), foedtDato: v('foedtDato'), refnr: v('refnr'),
    rekvirent: v('rekvirent'), rekvirentVed: v('rekvirentVed'),
    rekvirentTlf: v('rekvirentTlf'), rekvirentEpost: v('rekvirentEpost'),
    annenVenteInfo: v('annenVenteInfo'),
    paarorendeNavn: v('paarorendeNavn'),
    paarorendeVenter: document.getElementById('paarorendeVenter')?.value || 'nei',
    legeVenter: document.getElementById('legeVenter')?.value || 'nei',
    politiVenter: document.getElementById('politiVenter')?.value || 'nei',
    legeVentes: document.getElementById('legeVentes')?.value || 'nei',
    doedsattestSkrevet: document.getElementById('doedsattestSkrevet')?.value || 'nei',
    privatHenting: cbkState.privatHenting, obduksjon: cbkState.obduksjon,
    avlastning: cbkState.avlastning, rettslig: cbkState.rettslig,
    eierbyraa: cbkState.eierbyraa, donor: cbkState.donor,
    eiendelAktiv: eiendelAktiv,
    paarorendeVarslet: document.getElementById('paarorendeVarslet')?.value || 'nei',
    diverseOpplysninger: v('diverseOpplysninger'),
  };
}

// ===== HISTORIKK =====
const HKEY = 'mors_historikk';

function hentHistorikk() {
  try {
    const data = JSON.parse(localStorage.getItem(HKEY) || '[]');
    const grense = Date.now() - 7*24*60*60*1000;
    return data.filter(o => o.lagretTid > grense);
  } catch(e) { return []; }
}

function lagreIHistorikk(data) {
  try {
    let h = hentHistorikk();
    h.unshift(data);
    localStorage.setItem(HKEY, JSON.stringify(h));
  } catch(e) {}
}

function oppdaterHistorikkTeller() {
  const n = hentHistorikk().length;
  const el = document.getElementById('historikkTeller');
  el.textContent = n;
  el.style.display = n > 0 ? 'inline-block' : 'none';
}

function byggHistorikkListe() {
  const data = hentHistorikk();
  const liste = document.getElementById('historikkListe');
  if (data.length === 0) {
    liste.innerHTML = '<div class="tom-historikk"><div class="ikon">📂</div><p>Ingen oppdrag siste 7 dager</p></div>';
    return;
  }
  liste.innerHTML = data.map((o,i) => `
    <button class="historikk-rad" onclick="visDetalj(${i})" type="button">
      <div class="hist-ikon">✦</div>
      <div class="hist-info">
        <div class="hist-navn">${o.avdoedesNavn || 'Ukjent'}</div>
        <div class="hist-meta">${o.oppdragstidspunkt || '—'} · ${o.oppdragssted || '—'}</div>
      </div>
      <div class="hist-pil">›</div>
    </button>
  `).join('');
}

function visDetalj(idx) {
  const data = hentHistorikk();
  const o = data[idx];
  if (!o) return;
  aktivtOppdragIdx = idx;
  document.getElementById('detaljNavn').textContent = o.avdoedesNavn || 'Ukjent';
  document.getElementById('detaljMeta').textContent = (o.oppdragstidspunkt||'—') + ' · ' + (o.oppdragssted||'—');

  const felter = [
    ['Tidspunkt', o.oppdragstidspunkt], ['Oppdragssted', o.oppdragssted],
    ['Adresse', o.oppdragsadresse], ['Poststed', o.poststed],
    ['Adressebeskr.', o.adressebeskrivelse], ['Transport til', o.transportTil],
    ['Avdødes navn', o.avdoedesNavn], ['Født', o.foedtDato], ['Refnr', o.refnr],
    ['Rekvirent', o.rekvirent], ['Rekv. ved', o.rekvirentVed],
    ['Tlf', o.rekvirentTlf], ['E-post', o.rekvirentEpost],
    ['Venteinfo', o.annenVenteInfo],
    ['Pårørende venter', o.paarorendeVenter], ['Politi venter', o.politiVenter],
    ['Dødsattest', o.doedsattestSkrevet], ['Lege venter', o.legeVenter],
    ['Lege ventes', o.legeVentes],
    ['Privat henting', o.privatHenting?'Ja':null],
    ['Avlastning', o.avlastning?'Ja':null],
    ['For eierbyrå', o.eierbyraa?'Ja':null],
    ['Obduksjon', o.obduksjon?'Ja':null],
    ['Rettslig', o.rettslig?'Ja':null],
    ['Donor', o.donor?'Ja':null],
    ['Eiendeler', o.eiendelAktiv?'Ja':'Nei'],
    ['Pårørende navn/tlf', o.paarorendeNavn],
    ['Pårørende varslet', o.paarorendeVarslet],
    ['Diverse', o.diverseOpplysninger],
  ];

  document.getElementById('detaljKropp').innerHTML = felter
    .filter(f => f[1] && f[1] !== 'nei')
    .map(f => `<div class="detalj-rad"><div class="detalj-etikett">${f[0]}</div><div class="detalj-verdi">${f[1]}</div></div>`)
    .join('');

  visSide('detalj');
}

function sendIgjen() {
  const data = hentHistorikk();
  const o = data[aktivtOppdragIdx];
  if (!o) return;
  const emne = 'MORS — ' + (o.avdoedesNavn||'Ukjent') + ' — ' + (o.oppdragstidspunkt||'');
  const mottakere = ['oushfpbefo@ous-hf.no','ole.setsaas@fonus.no','regnskap@byravakten.no','regnskap@fonus.no'];
  window.location.href = 'mailto:'+encodeURIComponent(mottakere.join(','))+'?subject='+encodeURIComponent(emne)+'&body='+encodeURIComponent(byggInnhold(o));
}

function pdfIgjen() {
  const data = hentHistorikk();
  const o = data[aktivtOppdragIdx];
  if (o) genererPDFFraData(o, null);
}

function slettOppdrag() {
  if (!confirm('Slette dette oppdraget?')) return;
  try {
    let h = hentHistorikk();
    h.splice(aktivtOppdragIdx,1);
    localStorage.setItem(HKEY, JSON.stringify(h));
  } catch(e) {}
  visSide('historikk');
}

// ===== BYGG INNHOLD =====
function byggInnhold(o) {
  const d = s => s||'—';
  const checks = [];
  if(o.privatHenting) checks.push('Privat henting');
  if(o.avlastning) checks.push('Avlastningskjøring');
  if(o.eierbyraa) checks.push('For eierbyrå');
  if(o.obduksjon) checks.push('Obduksjonskjøring');
  if(o.rettslig) checks.push('Rettslig henting');
  if(o.donor) checks.push('Donorkjøring');
  return `MORS-SKJEMA — Oslo Nøytrale Byråvakt AS
${'='.repeat(44)}

OPPDRAG
Tidspunkt:         ${d(o.oppdragstidspunkt)}
Oppdragssted:      ${d(o.oppdragssted)}
Adresse:           ${d(o.oppdragsadresse)}
Poststed:          ${d(o.poststed)}
Beskrivelse:       ${d(o.adressebeskrivelse)}
Transport til:     ${d(o.transportTil)}

AVDØDE
Navn:              ${d(o.avdoedesNavn)}
Født:              ${d(o.foedtDato)}
Refnr:             ${d(o.refnr)}

REKVIRENT
Navn:              ${d(o.rekvirent)}
Ved:               ${d(o.rekvirentVed)}
Telefon:           ${d(o.rekvirentTlf)}
E-post:            ${d(o.rekvirentEpost)}
Venteinfo:         ${d(o.annenVenteInfo)}

PÅRØRENDE
Navn:              ${d(o.paarorendeNavn)}

STATUS
Pårørende venter:  ${(o.paarorendeVenter||'nei').toUpperCase()}
Politi venter:     ${(o.politiVenter||'nei').toUpperCase()}
Dødsattest:        ${(o.doedsattestSkrevet||'nei').toUpperCase()}
Lege venter:       ${(o.legeVenter||'nei').toUpperCase()}
Lege ventes:       ${(o.legeVentes||'nei').toUpperCase()}
${checks.length>0?checks.map(c=>'☑ '+c).join('\n'):''}

NOTATER
Pårørende navn/tlf: ${d(o.paarorendeNavn)}
Pårørende varslet: ${(o.paarorendeVarslet||'nei').toUpperCase()}
Eiendeler:         ${o.eiendelAktiv?'JA':'NEI'}
Diverse:           ${d(o.diverseOpplysninger)}

${'─'.repeat(44)}
Oslo Nøytrale Byråvakt AS
vaktbil@byravakten.no  |  91 18 08 20 / 22 08 60 70`;
}

// ===== ÅPNE PDF I ACROBAT =====
function genererPDF() {
  const data = hentData();

  if (typeof window.jspdf === 'undefined') {
    alert('PDF-biblioteket lastes. Vent litt og prøv igjen.');
    return;
  }

  // Lagre i historikk
  lagreIHistorikk(data);
  oppdaterHistorikkTeller();

  // Generer og åpne PDF
  genererPDFFraData(data, null);
}

function genererPDF() {
  const data = hentData();

  // Valider mottakere
  const mottakere = [];
  document.querySelectorAll('.mottaker-badge.aktiv').forEach(b => {
    if (b.dataset.email) mottakere.push(b.dataset.email);
  });
  document.querySelectorAll('.mottaker-rad input[type=email]').forEach(i => {
    if (i.value.trim()) mottakere.push(i.value.trim());
  });

  if (mottakere.length === 0) {
    alert('Velg minst én mottaker før du sender.');
    return;
  }

  if (typeof window.jspdf === 'undefined') {
    alert('PDF-biblioteket lastes fortsatt. Vent litt og prøv igjen.');
    return;
  }

  // Vis sending-indikator
  const knapp = document.querySelector('.send-knapp');
  const original = knapp.textContent;
  knapp.textContent = '⏳ Sender...';
  knapp.disabled = true;

  // Generer PDF som base64
  genererPDFFraData(data, function(pdfBase64) {
    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        ...data,
        mottakere: mottakere,
        pdf: pdfBase64,
      }),
    })
    .then(function() {
      // no-cors gir alltid opaque response, vi antar suksess
      lagreIHistorikk(data);
      oppdaterHistorikkTeller();
      alert('✅ Sendt! Sjekk at e-post ankommer vaktbil@byravakten.no.');
      nullstillSkjema();
      visSide('forside');
    })
    .catch(function(err) {
      alert('❌ Nettverksfeil. Sjekk internett og prøv igjen.');
    })
    .finally(function() {
      knapp.textContent = original;
      knapp.disabled = false;
    });
  });
}

function genererPDF() {
  const data = hentData();
  lagreIHistorikk(data);
  oppdaterHistorikkTeller();
  genererPDFFraData(data, null);
}

function genererPDFFraData(o, callback) {
  if (typeof window.jspdf === 'undefined') { alert('PDF-biblioteket lastes. Prøv igjen.'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const dv = s => (s&&s.trim()&&s!=='—')?s.trim():'';
  const W=210, mg=20, rg=W-mg;

  doc.setFontSize(18); doc.setFont('times','bold'); doc.setTextColor(0,0,0);
  doc.text('Byr\u00e5vakten',mg,16);
  doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(80,80,80);
  doc.setCharSpace(0.8); doc.text('OSLO N\u00d8YTRALE BYR\u00c5VAKT AS',mg,21); doc.setCharSpace(0);
  doc.setDrawColor(0,0,0); doc.setLineWidth(0.4); doc.line(mg,23,mg+58,23);

  doc.setFontSize(8);
  doc.setFont('helvetica','bold'); doc.text('E-post',mg,30);
  doc.setFont('helvetica','normal'); doc.text('vaktbil@byravakten.no',mg+18,30);
  doc.setFont('helvetica','bold'); doc.text('Telefon',mg,35);
  doc.setFont('helvetica','normal'); doc.text('91180820 / 22086070',mg+18,35);

  doc.setFontSize(16); doc.setFont('helvetica','bold'); doc.setTextColor(0,0,0);
  doc.text('MORS',mg,58);
  doc.setDrawColor(0,0,0); doc.setLineWidth(0.5); doc.line(mg,60,rg,60);

  let y=66;
  const lCol=mg, rCol=W/2+5, colW=W/2-mg-5, fh=7;

  function felt(lbl,val,x,fy,w){
    doc.setFontSize(7.5); doc.setFont('helvetica','normal'); doc.setTextColor(60,60,60);
    doc.text(lbl,x,fy);
    doc.setDrawColor(180,180,180); doc.setLineWidth(0.3);
    doc.roundedRect(x,fy+1,w,fh,0.5,0.5,'S');
    if(val){doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(0,0,0);doc.text(doc.splitTextToSize(val,w-3)[0],x+2,fy+5.8);}
  }

  function jnFelt(lbl,val,x,fy){
    doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(60,60,60);
    doc.text(lbl,x,fy);
    const isJa=(val||'nei')==='ja';
    doc.setDrawColor(150,150,150);doc.setLineWidth(0.3);
    doc.roundedRect(x+35,fy-4.5,14,6,0.5,0.5,'S');
    doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(0,0,0);
    doc.text(isJa?'Ja':'Nei',x+38,fy-0.5);
  }

  function checkFelt(lbl,checked,x,fy){
    const bx=x,by=fy-5,bs=6;
    doc.setDrawColor(120,120,120);doc.setLineWidth(0.4);
    doc.rect(bx,by,bs,bs,'S');
    if(checked){
      doc.setDrawColor(0,0,0);doc.setLineWidth(0.7);
      doc.line(bx+1,by+1,bx+bs-1,by+bs-1);
      doc.line(bx+bs-1,by+1,bx+1,by+bs-1);
    }
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(0,0,0);
    doc.text(lbl,x+9,fy-0.3);
  }

  felt('Oppdragstidspunkt',dv(o.oppdragstidspunkt),lCol,y,colW);
  felt('Rekvirent',dv(o.rekvirent),rCol,y,colW); y+=fh+5;
  felt('Oppdragssted',dv(o.oppdragssted),lCol,y,colW);
  felt('Rekvirent ved',dv(o.rekvirentVed),rCol,y,colW); y+=fh+5;
  felt('Oppdragsadresse',dv(o.oppdragsadresse),lCol,y,colW);
  felt('RekvirentTlf',dv(o.rekvirentTlf),rCol,y,colW/2-2); y+=fh+5;
  felt('Poststed',dv(o.poststed),lCol,y,colW);
  felt('E-post',dv(o.rekvirentEpost),rCol,y,colW); y+=fh+5;
  felt('Adressebeskrivelse',dv(o.adressebeskrivelse),lCol,y,colW);
  doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(60,60,60);
  doc.text('Annen vente info',rCol,y);
  doc.setDrawColor(180,180,180);doc.setLineWidth(0.3);
  doc.roundedRect(rCol,y+1,colW,14,0.5,0.5,'S');
  if(dv(o.annenVenteInfo)){doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(0,0,0);doc.text(dv(o.annenVenteInfo),rCol+2,y+6);}
  y+=fh+5;
  felt('Transport til',dv(o.transportTil),lCol,y,colW); y+=fh+5;
  felt('F\u00f8dt dato',dv(o.foedtDato),lCol,y,colW/2-2);
  felt('Avd\u00f8des navn',dv(o.avdoedesNavn),lCol+colW/2+2,y,colW/2-2);
  felt('Refnr',dv(o.refnr),rCol,y,colW); y+=fh+8;

  doc.setDrawColor(180,180,180);doc.setLineWidth(0.3);doc.line(lCol,y,rg,y); y+=7;

  jnFelt('P\u00e5r\u00f8rende venter',o.paarorendeVenter,lCol,y);
  jnFelt('Lege venter',o.legeVenter,rCol,y); y+=8;
  jnFelt('Politi venter',o.politiVenter,lCol,y);
  jnFelt('Lege ventes',o.legeVentes,rCol,y); y+=8;
  jnFelt('D\u00f8dsattest skrevet',o.doedsattestSkrevet,lCol,y); y+=10;

  doc.setDrawColor(180,180,180);doc.setLineWidth(0.3);doc.line(lCol,y,rg,y); y+=7;

  checkFelt('Privat henting',o.privatHenting,lCol,y);
  checkFelt('Obduksjonskj\u00f8ring',o.obduksjon,rCol,y); y+=8;
  checkFelt('Avlastningskj\u00f8ring',o.avlastning,lCol,y);
  checkFelt('Rettslig henting',o.rettslig,rCol,y); y+=8;
  checkFelt('For eierbyr\u00e5',o.eierbyraa,lCol,y);
  checkFelt('Donorkj\u00f8ring',o.donor,rCol,y); y+=12;

  doc.setDrawColor(0,0,0);doc.setLineWidth(0.5);
  doc.rect(lCol,y-6,rg-lCol,9,'S');
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(0,0,0);
  doc.text('P\u00e5r\u00f8rende',lCol+2,y-2);
  doc.setFont('helvetica','normal');
  doc.text('Navn/tlf:',lCol+28,y-2);
  if(dv(o.paarorendeNavn)) doc.text(dv(o.paarorendeNavn),lCol+50,y-2);
  var pvJa=(o.paarorendeVarslet||'nei')==='ja';
  doc.text('Varslet:',rg-40,y-2);
  doc.setFont('helvetica','bold');
  doc.setTextColor(pvJa?22:180,pvJa?140:50,pvJa?50:50);
  doc.text(pvJa?'JA':'NEI',rg-18,y-2);
  y+=11;

  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(0,0,0);
  doc.text('Mottat eiendeler:',lCol+2,y);
  const bx2=lCol+37,by2=y-5,bs2=6;
  doc.setDrawColor(120,120,120);doc.setLineWidth(0.4);doc.rect(bx2,by2,bs2,bs2,'S');
  if(o.eiendelAktiv){doc.setDrawColor(0,0,0);doc.setLineWidth(0.7);doc.line(bx2+1,by2+1,bx2+bs2-1,by2+bs2-1);doc.line(bx2+bs2-1,by2+1,bx2+1,by2+bs2-1);}
  y+=10;

  doc.setDrawColor(0,0,0);doc.setLineWidth(0.4);doc.rect(lCol,y-5,rg-lCol,28,'S');
  doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(60,60,60);
  doc.text('Diverse opplysninger',lCol+2,y-1);
  if(dv(o.diverseOpplysninger)){doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(0,0,0);doc.text(doc.splitTextToSize(dv(o.diverseOpplysninger),rg-lCol-4).slice(0,4),lCol+2,y+6);}
  y+=32;

  doc.setDrawColor(0,0,0);doc.setLineWidth(0.4);doc.rect(lCol,y-5,rg-lCol,18,'S');
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(0,0,0);
  doc.text('Signatur:',lCol+2,y);

  const etternavn=dv(o.avdoedesNavn).split(',')[0].trim().replace(/[^a-zA-Z0-9 -]/g,'')||'Ukjent';
  if (callback) {
    // Return base64 for Apps Script sending
    const pdfBase64 = doc.output('datauristring').split(',')[1];
    callback(pdfBase64);
  } else {
    // Direct download fallback
    doc.save('MORS_'+etternavn+'.pdf');
  }
}

// ===== NULLSTILL =====
function nullstillSkjema() {
  ['oppdragstidspunkt','oppdragssted','oppdragsadresse','poststed','adressebeskrivelse',
   'transportTil','avdoedesNavn','foedtDato','refnr','rekvirent','rekvirentVed',
   'rekvirentTlf','rekvirentEpost','annenVenteInfo','paarorendeNavn','diverseOpplysninger'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.value='';
  });

  const n=new Date();
  const dd=n.getDate(), mo=n.getMonth()+1, yy=String(n.getFullYear()).slice(-2);
  const hh=String(n.getHours()).padStart(2,'0'), mm=String(n.getMinutes()).padStart(2,'0');
  document.getElementById('oppdragstidspunkt').value=dd+'.'+mo+'.'+yy+' '+hh+':'+mm;

  ['paarorende','legeVenter','politiVenter','legeVentes','dodsattest','paarorendeVarslet'].forEach(f=>setJN(f,'nei'));

  Object.keys(cbkState).forEach(k=>{
    cbkState[k]=false;
    document.getElementById('cbk_'+k)?.classList.remove('aktiv');
    const b=document.getElementById('cbkboks_'+k);
    if(b) b.innerHTML='';
  });

  eiendelAktiv=false;
  document.getElementById('eiendelKnapp').classList.remove('aktiv');
  document.getElementById('eiendelKnapp').style.background='#fafafa';
  document.getElementById('eiendelKnapp').style.borderColor='#ddd';
  document.getElementById('eiendelBoks').innerHTML='';

  document.querySelectorAll('.mottaker-badge').forEach(b=>{
    b.classList.remove('aktiv');
    b.querySelector('.badge-ikon').textContent='+';
  });

  const ml2 = document.getElementById('mottakerListe'); if(ml2) ml2.innerHTML='';
}

function nullstill() {
  if(!confirm('Nullstille hele skjemaet?')) return;
  nullstillSkjema();
}

// ===== INIT =====
window.addEventListener('load', () => {
  nullstillSkjema();
  lastMottakere();
  oppdaterHistorikkTeller();
});
</script>
